name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  public-site:
    name: Public Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build public site
        run: npm run build

  team-app-unit:
    name: Team App Unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/team-app/package-lock.json

      - name: Install dependencies
        working-directory: apps/team-app
        run: npm ci

      - name: Write local app env
        working-directory: apps/team-app
        run: |
          cat > .env.local <<'EOF'
          AUTH_MODE=local
          AUTH_SECRET=ci-local-auth-secret
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/cabestany_campaign_app_test
          EOF

      - name: Run unit tests
        working-directory: apps/team-app
        run: npm test

      - name: Build team app
        working-directory: apps/team-app
        run: npm run build

  team-app-e2e:
    name: Team App E2E
    runs-on: ubuntu-latest
    needs:
      - team-app-unit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cabestany_campaign_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cabestany_campaign_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/cabestany_campaign_app_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/team-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        working-directory: apps/team-app
        run: npm ci

      - name: Write local app env
        working-directory: apps/team-app
        run: |
          cat > .env.local <<'EOF'
          AUTH_MODE=local
          AUTH_SECRET=ci-local-auth-secret
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/cabestany_campaign_app_test
          EOF

      - name: Bootstrap PostgreSQL test database
        run: bash ./scripts/bootstrap_team_app_ci.sh

      - name: Install Playwright browser
        working-directory: apps/team-app
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/team-app
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/team-app/playwright-report
            apps/team-app/test-results
          if-no-files-found: ignore
